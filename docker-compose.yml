services:
  # ──────────────────────────────────────────────────────────────
  # Image 1: Nginx — single public entrypoint (port 80)
  # Routes: / → Streamlit, /api/ → FastAPI, /static/ → disk
  # ──────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: hse-prom-prog-nginx
    depends_on:
      api:
        condition: service_healthy
      streamlit:
        condition: service_healthy
      static:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/var/www/static:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - hse-network

  # ──────────────────────────────────────────────────────────────
  # Image 3: Static files container — shares volume with nginx
  # ──────────────────────────────────────────────────────────────
  static:
    build:
      context: .
      dockerfile: nginx/Dockerfile.static
    container_name: hse-prom-prog-static
    volumes:
      - static_files:/var/www/static
    networks:
      - hse-network

  # ──────────────────────────────────────────────────────────────
  # Qdrant — vector store for RAG Agent
  # ──────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: hse-prom-prog-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hse-network

  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: hse-prom-prog-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hse_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hse_password}
      POSTGRES_DB: ${POSTGRES_DB:-hse_jira_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hse_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hse-network

  # Download avibe-gptq-8bit model from Yandex Cloud S3 into shared volume
  download-model:
    image: amazon/aws-cli:2.22.35
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-ru-central1}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        if [ -f /models/avibe-gptq-8bit/config.json ]; then
          echo "Model already downloaded, skipping"
          exit 0
        fi
        echo "Downloading avibe-gptq-8bit from S3..."
        aws s3 sync \
          s3://${S3_BUCKET:-quant-models-agile}/${S3_MODEL_PATH:-models/avibe-gptq-8bit}/ \
          /models/avibe-gptq-8bit/ \
          --endpoint-url ${S3_ENDPOINT:-https://storage.yandexcloud.net} || exit 1
        test -f /models/avibe-gptq-8bit/config.json || { echo "ERROR: config.json not found after download"; exit 1; }
        echo "Download complete"
        ls -lh /models/avibe-gptq-8bit/
    volumes:
      - vllm-cache:/models
    networks:
      - hse-network

  # vLLM service for serving the LLM model (avibe-gptq-8bit from S3)
  vllm:
    image: vllm/vllm-openai:v0.9.1
    container_name: vllm-server
    depends_on:
      download-model:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    command:
      - --model=/models/avibe-gptq-8bit
      - --quantization=gptq
      - --dtype=float16
      - --max-model-len=8192
    volumes:
      - vllm-cache:/models
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s
    networks:
      - hse-network

  # Application service (CLI)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hse-prom-prog-app
    depends_on:
      postgres:
        condition: service_healthy
      vllm:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      - VLLM_BASE_URL=http://vllm:8000/v1
      - VLLM_MODEL=/models/avibe-gptq-8bit
      - VLLM_API_KEY=EMPTY
      - LOG_LEVEL=INFO
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-hse_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-hse_password}
      - POSTGRES_DB=${POSTGRES_DB:-hse_jira_db}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION_NAME=business_docs
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-ru-central1}
      - S3_KB_BUCKET=${S3_KB_BUCKET:-knowledge-base}
      - S3_KB_PATH=${S3_KB_PATH:-knowledge_base}
      - S3_DATA_BUCKET=${S3_DATA_BUCKET:-database-agile}
      - S3_DATA_PATH=${S3_DATA_PATH:-data}
      - S3_ENDPOINT=${S3_ENDPOINT:-https://storage.yandexcloud.net}
    volumes:
      - ./hse_prom_prog:/app/hse_prom_prog
      - ./eval:/app/eval
      - ./.env:/app/.env
    stdin_open: true
    tty: true
    networks:
      - hse-network

  # Redis for Celery broker
  redis:
    image: redis:7-alpine
    container_name: hse-prom-prog-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hse-network

  # ──────────────────────────────────────────────────────────────
  # Image 2: FastAPI (Producer) — production mode behind nginx
  # Gunicorn + UvicornWorker, DEBUG=false
  # ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hse-prom-prog-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vllm:
        condition: service_healthy
    environment:
      - DEBUG=false
      - VLLM_BASE_URL=http://vllm:8000/v1
      - VLLM_MODEL=/models/avibe-gptq-8bit
      - VLLM_API_KEY=EMPTY
      - LOG_LEVEL=INFO
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-hse_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-hse_password}
      - POSTGRES_DB=${POSTGRES_DB:-hse_jira_db}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - FASTAPI_HOST=0.0.0.0
      - FASTAPI_PORT=8080
    # No external ports — nginx is the single public entrypoint
    expose:
      - "8080"
    volumes:
      - ./hse_prom_prog:/app/hse_prom_prog
      - ./.env:/app/.env
    # Production: gunicorn with uvicorn workers (no --reload)
    command:
      gunicorn hse_prom_prog.api.app:app -k uvicorn.workers.UvicornWorker --bind
      0.0.0.0:8080 --workers 2 --timeout 300 --access-logfile -
    networks:
      - hse-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery worker (Consumer) — uses the SAME Dockerfile, only command differs
  # No container_name so that --scale works: docker compose up --scale celery-worker=3
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vllm:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      - DEBUG=false
      - VLLM_BASE_URL=http://vllm:8000/v1
      - VLLM_MODEL=/models/avibe-gptq-8bit
      - VLLM_API_KEY=EMPTY
      - LOG_LEVEL=INFO
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-hse_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-hse_password}
      - POSTGRES_DB=${POSTGRES_DB:-hse_jira_db}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION_NAME=business_docs
      - CELERY_TASK_TIME_LIMIT=600
      - CELERY_TASK_SOFT_TIME_LIMIT=300
    volumes:
      - ./hse_prom_prog:/app/hse_prom_prog
      - ./.env:/app/.env
    # --pool=threads: I/O-bound tasks (waiting for vLLM HTTP), not CPU-bound
    command:
      celery -A hse_prom_prog.tasks.celery_app worker --loglevel=info
      --pool=threads --concurrency=4
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A hse_prom_prog.tasks.celery_app inspect ping --timeout 10",
        ]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 30s
    networks:
      - hse-network

  # Streamlit frontend (thin client, talks only to FastAPI)
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hse-prom-prog-streamlit
    depends_on:
      api:
        condition: service_healthy
    environment:
      - DEBUG=false
      - API_BASE_URL=http://api:8080
      - POLL_INTERVAL_SEC=2
      - POLL_TIMEOUT_SEC=120
    # No external ports — nginx is the single public entrypoint
    expose:
      - "8501"
    volumes:
      - ./streamlit_app:/app/streamlit_app
      - ./.streamlit:/app/.streamlit
    command:
      streamlit run streamlit_app/app.py --server.port=8501
      --server.headless=true --server.address=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - hse-network

  # Alembic migration runner (one-shot: docker compose run --rm migrate)
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-hse_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-hse_password}
      - POSTGRES_DB=${POSTGRES_DB:-hse_jira_db}
    volumes:
      - ./hse_prom_prog:/app/hse_prom_prog
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./.env:/app/.env
    command: alembic upgrade head
    networks:
      - hse-network

  # One-shot job: download CSVs from S3 and load into PostgreSQL
  load-data:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-hse_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-hse_password}
      - POSTGRES_DB=${POSTGRES_DB:-hse_jira_db}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-ru-central1}
      - S3_DATA_BUCKET=${S3_DATA_BUCKET:-database-agile}
      - S3_DATA_PATH=${S3_DATA_PATH:-data}
      - S3_ENDPOINT=${S3_ENDPOINT:-https://storage.yandexcloud.net}
    volumes:
      - ./hse_prom_prog:/app/hse_prom_prog
      - ./.env:/app/.env
    command: python -m hse_prom_prog.database.load_csv
    networks:
      - hse-network

volumes:
  postgres_data:
  vllm-cache:
  redis_data:
  static_files:
  qdrant_data:

networks:
  hse-network:
    driver: bridge
