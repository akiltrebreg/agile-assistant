name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-flight run for the same ref when a new push lands —
# saves CI minutes on rapid back-to-back pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: pytest (unit + contract)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # Tracing must be off in CI — conftest.py also sets these via
      # os.environ.setdefault, but pinning here keeps the test runner
      # deterministic even if conftest is bypassed (e.g. ad-hoc invocation).
      LANGFUSE_ENABLED: "false"
      JUDGE_ENABLED: "false"
      # Pydantic Settings reads these at import time. Provide harmless
      # defaults so module-level Settings() instantiation in test
      # collection doesn't crash on a missing env var.
      DATABASE_URL: "postgresql://test:test@localhost:5432/test"
      VLLM_BASE_URL: "http://localhost:8000/v1"
      VLLM_API_KEY: "test-key"
      REDIS_URL: "redis://localhost:6379/0"
      QDRANT_URL: "http://localhost:6333"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Poetry
        # Poetry 2.x is required because pyproject.toml uses PEP 735
        # ``[dependency-groups]`` (and PEP 621 ``[project]``) instead of the
        # legacy ``[tool.poetry]`` block. Poetry 1.x falls back with
        # ``[tool.poetry] section not found``.
        run: pipx install poetry==2.0.1

      - name: Configure Poetry
        run: |
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: poetry-${{ runner.os }}-py3.13-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-py3.13-

      - name: Install dependencies
        # ``--no-interaction`` so a creds prompt never blocks CI.
        # ``--no-ansi`` keeps logs grep-friendly.
        run: poetry install --no-interaction --no-ansi

      - name: Run unit + contract tests with coverage
        # Integration suite is excluded by design — it needs a real DB,
        # Qdrant, and Redis (see pyproject.toml markers section).
        run: |
          poetry run pytest tests/unit tests/contract \
            --cov=hse_prom_prog \
            --cov-report=term \
            --cov-report=xml \
            --cov-report=html \
            -v

      - name: Upload coverage XML artefact
        # Always upload — the report is useful even when fail_under
        # tripped. ``if: always()`` survives test failures.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

      - name: Upload coverage HTML artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 14

      - name: Upload coverage to Codecov
        # Token-less upload: works for public repos. For private repos,
        # set CODECOV_TOKEN as a repo secret. ``fail_ci_if_error: false``
        # keeps a Codecov outage from blocking PR merges.
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: unit,contract
          fail_ci_if_error: false

  lint:
    name: pre-commit (ruff + codespell)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Cache pre-commit hooks
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key:
            pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml')
            }}

      - name: Run pre-commit on changed files
        # ``--from-ref/--to-ref`` only lints files changed in this PR;
        # full-tree linting is the developer's local responsibility.
        # On main pushes (no base ref), fall back to running on all files.
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pre-commit run --from-ref "${{ github.event.pull_request.base.sha }}" --to-ref "${{ github.event.pull_request.head.sha }}"
          else
            pre-commit run --all-files
          fi
