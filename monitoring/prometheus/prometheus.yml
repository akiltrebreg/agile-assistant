global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # 1. FastAPI application — HTTP metrics + custom queue collector
  - job_name: "fastapi"
    static_configs:
      - targets: ["api:8080"]
    metrics_path: /metrics
    scrape_interval: 15s

  # 2. Celery worker — pipeline + signal metrics on a side-car HTTP
  #    server started by celery_app.py (no native metrics endpoint).
  - job_name: "celery-worker"
    static_configs:
      - targets: ["celery-worker:9100"]
    metrics_path: /metrics
    scrape_interval: 15s

  # 2b. Celery judge worker — Phase 4. Same code path, separate process
  #     and port so JUDGE_* metrics are scraped from the worker that
  #     actually owns them. Port is set via PROMETHEUS_PORT=9101 in the
  #     celery-judge service env.
  - job_name: "celery-judge"
    static_configs:
      - targets: ["celery-judge:9101"]
    metrics_path: /metrics
    scrape_interval: 15s

  # 3. vLLM main (avibe-gptq-8bit, port 8000 inside the docker network)
  - job_name: "vllm-main"
    static_configs:
      - targets: ["vllm:8000"]
    metrics_path: /metrics
    scrape_interval: 15s

  # 4. vLLM SQL (Qwen3-8B-AWQ). Container listens on :8000 internally;
  #    the host-side 8001 mapping is irrelevant to inter-container DNS.
  - job_name: "vllm-sql"
    static_configs:
      - targets: ["vllm-sql:8000"]
    metrics_path: /metrics
    scrape_interval: 15s

  # 5. PostgreSQL (via postgres-exporter)
  - job_name: "postgresql"
    static_configs:
      - targets: ["pg-exporter:9187"]
    scrape_interval: 15s

  # 6. Redis (via redis-exporter)
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
    scrape_interval: 15s

  # 7. Qdrant native /metrics (>= v1.7)
  - job_name: "qdrant"
    static_configs:
      - targets: ["qdrant:6333"]
    metrics_path: /metrics
    scrape_interval: 30s

  # 8. Prometheus self-monitoring
  # route-prefix=/prometheus/ shifts /metrics under /prometheus/metrics —
  # the default metrics_path of /metrics now 404s.
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
    metrics_path: /prometheus/metrics
