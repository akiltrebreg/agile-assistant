upstream fastapi {
    server api:8080;
}

upstream streamlit {
    server streamlit:8501;
}

server {
    listen 80;
    server_name localhost;

    # gzip for proxied assets — without this Prometheus / Grafana
    # ship multi-megabyte React bundles uncompressed, making first
    # page load slow over WAN even though scrape latency is fine.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        application/javascript
        application/json
        application/wasm
        text/css
        text/plain
        text/html
        image/svg+xml;

    # --- Static files ---
    # First try our custom files in the shared volume,
    # then fall through to Streamlit (which serves its own /static/js, /static/css, etc.)
    location /static/ {
        root /var/www;
        try_files $uri @streamlit_fallback;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location @streamlit_fallback {
        proxy_pass http://streamlit;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Favicon shortcut
    location = /favicon.ico {
        alias /var/www/static/favicon.svg;
        access_log off;
    }

    # Prometheus /metrics is internal-only — Prometheus scrapes the
    # api container directly over the docker network. This rule must
    # precede the generic /api/ block to win the longest-prefix match.
    location = /api/metrics {
        return 404;
    }

    # --- Prometheus UI (gzipped, subpath /prometheus/) ---
    # Internal Prometheus listens on root (web.route-prefix=/), nginx
    # strips the /prometheus/ prefix via the trailing slash on
    # proxy_pass. The --web.external-url flag tells the React UI
    # what to bake into absolute links it generates server-side.
    location /prometheus/ {
        proxy_pass http://prometheus:9090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # --- FastAPI reverse proxy (/api/) ---
    location /api/ {
        # Strip /api prefix: /api/tasks -> /tasks
        rewrite ^/api(/.*)$ $1 break;

        proxy_pass http://fastapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # FastAPI docs (pass through without rewrite)
    location /docs {
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /redoc {
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /openapi.json {
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
    }

    # FastAPI health (used by healthchecks)
    location = /health {
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
    }

    # --- Streamlit reverse proxy (/ — everything else) ---
    # Streamlit WebSocket endpoint
    location /_stcore/stream {
        proxy_pass http://streamlit;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Streamlit health (internal)
    location /_stcore/health {
        proxy_pass http://streamlit;
        proxy_set_header Host $host;
    }

    # Streamlit — all remaining requests
    location / {
        proxy_pass http://streamlit;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
