upstream fastapi {
    server api:8080;
}

upstream streamlit {
    server streamlit:8501;
}

upstream langfuse {
    server langfuse:3000;
}

server {
    listen 80;
    server_name localhost;

    # gzip for proxied assets — without this Prometheus / Grafana
    # ship multi-megabyte React bundles uncompressed, making first
    # page load slow over WAN even though scrape latency is fine.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 5;
    # text/html is already in nginx's built-in gzip_types — listing it
    # again triggers a "duplicate MIME type" warning at reload, so we
    # cover only the extras here. Both modern (application/javascript)
    # and legacy (text/javascript, application/x-javascript) JS types
    # are listed because Grafana 11 still serves bundles as
    # text/javascript and would otherwise skip compression.
    gzip_types
        application/javascript
        text/javascript
        application/x-javascript
        application/json
        application/wasm
        text/css
        text/plain
        image/svg+xml;

    # --- Static files ---
    # First try our custom files in the shared volume,
    # then fall through to Streamlit (which serves its own /static/js, /static/css, etc.)
    location /static/ {
        root /var/www;
        try_files $uri @streamlit_fallback;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location @streamlit_fallback {
        proxy_pass http://streamlit;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Favicon shortcut
    location = /favicon.ico {
        alias /var/www/static/favicon.svg;
        access_log off;
    }

    # Prometheus /metrics is internal-only — Prometheus scrapes the
    # api container directly over the docker network. This rule must
    # precede the generic /api/ block to win the longest-prefix match.
    location = /api/metrics {
        return 404;
    }

    # --- Prometheus UI (gzipped, subpath /prometheus/) ---
    # Prometheus serves natively under /prometheus/ (web.route-prefix
    # matches web.external-url), so nginx forwards the path as-is —
    # note the absence of a trailing slash on proxy_pass.
    location /prometheus/ {
        proxy_pass http://prometheus:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # --- Grafana UI (gzipped, subpath /grafana/) ---
    # GF_SERVER_SERVE_FROM_SUB_PATH=true makes Grafana own the
    # /grafana/ prefix end-to-end. WebSocket headers enable Grafana
    # Live (realtime dashboards); $http_connection passes the client's
    # original Connection header so plain HTTP keeps "keep-alive" and
    # WS upgrades keep "Upgrade".
    #
    # Larger proxy buffers prevent the multi-MB Grafana JS bundles from
    # spilling to disk ("upstream response is buffered to a temporary
    # file"), which (a) tanks throughput and (b) defeats nginx gzip on
    # responses already committed to a tempfile. With these sizes the
    # biggest 3.6 MB chunk streams through RAM and gets compressed.
    location /grafana/ {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_read_timeout 60s;
        proxy_buffer_size 64k;
        proxy_buffers 16 256k;
        proxy_busy_buffers_size 256k;
        proxy_max_temp_file_size 0;
    }

    # --- Langfuse UI (LLM tracing, Phase 3) ---
    # Langfuse is a Next.js app — it needs WebSocket upgrades for HMR-
    # like internals and emits absolute URLs based on NEXTAUTH_URL.
    # Path is forwarded as-is; NEXTAUTH_URL=http://localhost:3001 in
    # docker-compose, so direct host access on :3001 still works.
    location /langfuse/ {
        proxy_pass http://langfuse/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_read_timeout 60s;
    }

    # --- FastAPI reverse proxy (/api/) ---
    location /api/ {
        # Strip /api prefix: /api/tasks -> /tasks
        rewrite ^/api(/.*)$ $1 break;

        proxy_pass http://fastapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # FastAPI docs (pass through without rewrite)
    location /docs {
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /redoc {
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /openapi.json {
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
    }

    # FastAPI health (used by healthchecks)
    location = /health {
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
    }

    # --- Streamlit reverse proxy (/ — everything else) ---
    # Streamlit WebSocket endpoint
    location /_stcore/stream {
        proxy_pass http://streamlit;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Streamlit health (internal)
    location /_stcore/health {
        proxy_pass http://streamlit;
        proxy_set_header Host $host;
    }

    # Streamlit — all remaining requests
    location / {
        proxy_pass http://streamlit;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
