apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: agile-assistant
  labels:
    app.kubernetes.io/part-of: agile-assistant
data:
  # vLLM
  VLLM_BASE_URL: "http://vllm-server:8000/v1"
  VLLM_MODEL: "/models/avibe-gptq-8bit"
  VLLM_TEMPERATURE: "0.7"
  VLLM_MAX_TOKENS: "2048"
  VLLM_REPETITION_PENALTY: "1.15"

  # S3 Model Storage (Yandex Cloud)
  S3_ENDPOINT: "https://storage.yandexcloud.net"
  AWS_DEFAULT_REGION: "ru-central1"

  # Legacy keys (used by vllm init-container to fetch LLM weights)
  S3_BUCKET: "quant-models-agile"
  S3_MODEL_PATH: "models/avibe-gptq-8bit"

  # Embedding / reranker model storage (read at runtime by ingest + RAG)
  S3_MODELS_BUCKET: "quant-models-agile"
  S3_MODELS_PATH: "models"
  EMBEDDING_MODEL_CACHE_DIR: "/app/models"

  # Knowledge base + CSV data sources
  S3_KB_BUCKET: "knowledge-base"
  S3_KB_PATH: "knowledge_base"
  S3_DATA_BUCKET: "database-agile"
  S3_DATA_PATH: "data"

  # PostgreSQL
  POSTGRES_HOST: "postgres-cluster-rw"
  POSTGRES_PORT: "5432"
  POSTGRES_USER: "hse_user"
  POSTGRES_DB: "hse_jira_db"

  # Qdrant
  QDRANT_URL: "http://qdrant:6333"
  QDRANT_COLLECTION_NAME: "business_docs"
  EMBEDDING_MODEL: "multilingual-e5-base"

  # Redis
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"

  # Celery
  CELERY_TASK_TIME_LIMIT: "600"
  CELERY_TASK_SOFT_TIME_LIMIT: "300"

  # FastAPI
  FASTAPI_HOST: "0.0.0.0"
  FASTAPI_PORT: "8080"

  # Streamlit
  API_BASE_URL: "http://api:8080"
  POLL_INTERVAL_SEC: "2"
  POLL_TIMEOUT_SEC: "300"

  # Memory Layer
  # HISTORY_TOKEN_BUDGET: token budget for the short-term history slot
  # injected into agent prompts (see memory.context_builder).
  # SESSION_TIMEOUT_MINUTES: a conversation idle longer than this is
  # auto-closed and a fresh one is started on the next request
  # (see tasks.workflow_task._maybe_rotate_stale_conversation).
  HISTORY_TOKEN_BUDGET: "1200"
  SESSION_TIMEOUT_MINUTES: "30"

  # Logging
  LOG_LEVEL: "INFO"
  DEBUG: "false"
