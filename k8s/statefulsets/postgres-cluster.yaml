apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-cluster
  namespace: agile-assistant
  labels:
    app.kubernetes.io/part-of: agile-assistant
spec:
  instances: 3

  postgresql:
    parameters:
      shared_buffers: "256MB"
      max_connections: "100"

  bootstrap:
    initdb:
      database: hse_jira_db
      owner: hse_user
      secret:
        name: postgres-credentials
      postInitApplicationSQL:
        - "CREATE TABLE IF NOT EXISTS report_agile_dashboard (launch_id INT NOT
          NULL, issue_key VARCHAR(32), jirasprint_id BIGINT, sprint_name
          VARCHAR(256), start_date TIMESTAMP, end_date TIMESTAMP, complete_date
          TIMESTAMP, activation_date TIMESTAMP, sprint_state VARCHAR(128),
          issue_department VARCHAR(32), issue_project VARCHAR(256), unit
          VARCHAR(128), cluster VARCHAR(128), issue_type VARCHAR(256),
          feature_teams VARCHAR(256), storypoints_act FLOAT, reporter
          VARCHAR(256), create_time TIMESTAMP, resolution_time TIMESTAMP,
          summary VARCHAR(1024), resolution VARCHAR(256), issue_status_act
          VARCHAR(256), labels VARCHAR(1024), issue_unit VARCHAR(1024),
          added_until_sprint_start BOOLEAN, sprint_change_date_until_start
          TIMESTAMP, sprint_change_date_until_end TIMESTAMP,
          num_of_current_sprint_for_task INT, issue_status_end_of_sprint
          VARCHAR(256), storypoints_end_of_sprint FLOAT,
          storypoints_start_of_sprint FLOAT, storypoints_next_sprint FLOAT,
          original_estimate_end_of_sprint INT, original_estimate_start_of_sprint
          INT, original_estimate_act INT, assignee_name VARCHAR(256),
          issue_priority_for_bug VARCHAR(256), time_h_not_fixed INT,
          time_h_in_progress INT, merged_pr_count INT, last_comment_body
          VARCHAR(4000), issue_touch_time INT, feature_teams_start_of_sprint
          VARCHAR(256), feature_teams_end_of_sprint VARCHAR(256),
          issue_potential_removal_date TIMESTAMP, removal_status VARCHAR(256),
          version_id INT NOT NULL DEFAULT 0, is_report BOOLEAN, is_tech_debt
          BOOLEAN, estimate_sprint_end FLOAT, dev_approach VARCHAR(32),
          feature_teams_resolution VARCHAR(256), dev_approach_resolution
          VARCHAR(32), drop_team VARCHAR(256), is_pr BOOLEAN, epic_issue_key
          VARCHAR(32), actual_resolution VARCHAR(256), last_cancelled_date
          TIMESTAMP)"
        - "CREATE TABLE IF NOT EXISTS report_agile_dashboard_metrics (launch_id
          INT NOT NULL, cluster_name VARCHAR(128), unit_name VARCHAR(128),
          feature_teams VARCHAR(256), jirasprint_id BIGINT, sprint_name
          VARCHAR(256), activation_date TIMESTAMP, complete_date TIMESTAMP,
          initial_commitment_sp FLOAT, added_work_sp FLOAT, final_commitment_sp
          FLOAT, undone_sp FLOAT, complete_sp FLOAT, dev_potential_sp FLOAT,
          scope_drop FLOAT, done_total FLOAT, sprint_goal FLOAT,
          complete_initial_sp FLOAT, complete_count_sg INT, count_sg INT,
          sprint_state VARCHAR(32), version_id INT NOT NULL, count_retro_ai INT,
          dev_approach VARCHAR(32), initial_commitment_issues FLOAT,
          added_work_issues FLOAT, final_commitment_issues FLOAT, undone_issues
          FLOAT, cancel_issues FLOAT, complete_issues FLOAT, scope_drop_issues
          FLOAT, done_total_issues FLOAT, done_issues FLOAT,
          complete_initial_issues FLOAT, cancel_rate FLOAT)"
        - "CREATE INDEX IF NOT EXISTS idx_dashboard_issue_key ON
          report_agile_dashboard(issue_key)"
        - "CREATE INDEX IF NOT EXISTS idx_dashboard_sprint_id ON
          report_agile_dashboard(jirasprint_id)"
        - "CREATE INDEX IF NOT EXISTS idx_dashboard_sprint_state ON
          report_agile_dashboard(sprint_state)"
        - "CREATE INDEX IF NOT EXISTS idx_dashboard_assignee ON
          report_agile_dashboard(assignee_name)"
        - "CREATE INDEX IF NOT EXISTS idx_dashboard_launch_id ON
          report_agile_dashboard(launch_id)"
        - "CREATE INDEX IF NOT EXISTS idx_dashboard_feature_teams ON
          report_agile_dashboard(feature_teams)"
        - "CREATE INDEX IF NOT EXISTS idx_metrics_sprint_id ON
          report_agile_dashboard_metrics(jirasprint_id)"
        - "CREATE INDEX IF NOT EXISTS idx_metrics_feature_teams ON
          report_agile_dashboard_metrics(feature_teams)"
        - "CREATE INDEX IF NOT EXISTS idx_metrics_launch_id ON
          report_agile_dashboard_metrics(launch_id)"
        - "CREATE INDEX IF NOT EXISTS idx_metrics_sprint_state ON
          report_agile_dashboard_metrics(sprint_state)"

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

  storage:
    size: 2Gi
