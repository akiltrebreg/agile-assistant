apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  namespace: agile-assistant
  labels:
    app.kubernetes.io/part-of: agile-assistant
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
        - name: registry-credentials
      containers:
        - name: migrate
          image: ghcr.io/akiltrebreg/agile-assistant:latest
          imagePullPolicy: IfNotPresent
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
