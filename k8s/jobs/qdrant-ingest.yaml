apiVersion: batch/v1
kind: Job
metadata:
  name: qdrant-ingest
  namespace: agile-assistant
  labels:
    app.kubernetes.io/part-of: agile-assistant
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
        - name: registry-credentials
      containers:
        - name: ingest
          image: ghcr.io/akiltrebreg/agile-assistant:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "agile_assistant.rag.ingest"]
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
