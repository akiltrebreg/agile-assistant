apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-load-data
  namespace: agile-assistant
  labels:
    app.kubernetes.io/part-of: agile-assistant
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: load-data
          image: ghcr.io/akiltrebreg/agile-assistant:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          command: ["python", "-m", "agile_assistant.database.load_csv"]
