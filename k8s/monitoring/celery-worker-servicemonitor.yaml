# ServiceMonitor for celery-worker (Phase 1 main queue).
# Targets the headless Service celery-worker-svc.yaml on its
# http-metrics port (9100), where prometheus_client.start_http_server
# is bound by celery_app.py's worker_init signal handler.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: celery-worker
  namespace: agile-assistant
  labels:
    app: celery-worker
    app.kubernetes.io/part-of: agile-assistant
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - agile-assistant
  selector:
    matchLabels:
      app: celery-worker
  endpoints:
    - port: http-metrics
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
      relabelings:
        - action: replace
          targetLabel: job
          replacement: celery-worker
