apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: agile-assistant
  labels:
    app: vllm
    app.kubernetes.io/part-of: agile-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      # Init container: download GPTQ model from Yandex Cloud S3
      initContainers:
        - name: download-model
          image: amazon/aws-cli:2.22.35
          command:
            - sh
            - -c
            - |
              if [ -f /models/avibe-gptq-4bit/config.json ]; then
                echo "Model already downloaded, skipping"
                exit 0
              fi
              echo "Downloading avibe-gptq-4bit from S3..."
              aws s3 sync \
                s3://${S3_BUCKET}/${S3_MODEL_PATH}/ \
                /models/avibe-gptq-4bit/ \
                --endpoint-url ${S3_ENDPOINT}
              echo "Download complete"
              ls -lh /models/avibe-gptq-4bit/
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          volumeMounts:
            - name: model-cache
              mountPath: /models
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.8.5
          args:
            - --model=/models/avibe-gptq-4bit
            - --quantization=gptq
            - --dtype=float16
            - --max-model-len=8192
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: model-cache
              mountPath: /models
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "4"
              memory: 8Gi
              nvidia.com/gpu: "1"
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: vllm-cache
