apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: agile-assistant
  labels:
    app: api
    app.kubernetes.io/part-of: agile-assistant
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: agile-assistant:latest
          imagePullPolicy: Never
          command:
            - gunicorn
            - hse_prom_prog.api.app:app
            - -k
            - uvicorn.workers.UvicornWorker
            - --bind
            - 0.0.0.0:8080
            - --workers
            - "2"
            - --timeout
            - "300"
            - --access-logfile
            - "-"
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: app-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
