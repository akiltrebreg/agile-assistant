# Phase 5: Celery Beat — single-instance scheduler for periodic
# data-refresh tasks (sync_jira_data every 6h, sync_knowledge_base
# daily). Beat itself does not process tasks; it only writes them
# into Redis, where celery-worker picks them up. The whole point is
# that we run ONE beat — two beats would double-schedule every job.
#
# replicas: 1 + strategy: Recreate enforces the singleton invariant
# during rollouts: the old pod is killed before the new one starts,
# so there is never a window where two beats overlap.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: agile-assistant
  labels:
    app: celery-beat
    app.kubernetes.io/part-of: agile-assistant
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      imagePullSecrets:
        - name: registry-credentials
      containers:
        - name: celery-beat
          image: ghcr.io/akiltrebreg/agile-assistant:latest
          imagePullPolicy: IfNotPresent
          command:
            - celery
            - -A
            - hse_prom_prog.tasks.celery_app
            - beat
            - --loglevel=info
            - --schedule=/tmp/celerybeat-schedule
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          readinessProbe:
            exec:
              command: ["sh", "-c", "pgrep -f 'celery.*beat' >/dev/null"]
            initialDelaySeconds: 15
            periodSeconds: 30
          livenessProbe:
            exec:
              command: ["sh", "-c", "pgrep -f 'celery.*beat' >/dev/null"]
            initialDelaySeconds: 60
            periodSeconds: 60
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
