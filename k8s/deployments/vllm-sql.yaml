# vLLM SQL — Qwen3-8B-AWQ, dedicated process for the SQL Agent path.
# Mirrors docker-compose's ``vllm-sql`` service. Separate Deployment
# (not a second container in the main vllm Deployment) so each model
# can be scaled, restarted, and probed independently.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-sql
  namespace: agile-assistant
  labels:
    app: vllm-sql
    app.kubernetes.io/part-of: agile-assistant
spec:
  replicas: 1
  # Recreate: see comment in vllm.yaml — GPU is shared via time-slicing,
  # rolling updates deadlock on physical memory.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm-sql
  template:
    metadata:
      labels:
        app: vllm-sql
    spec:
      initContainers:
        - name: download-model
          image: amazon/aws-cli:2.22.35
          command:
            - sh
            - -c
            - |
              if [ -f /models/qwen3-8b-awq-4bit/config.json ]; then
                echo "Model already downloaded, skipping"
                exit 0
              fi
              echo "Downloading qwen3-8b-awq-4bit from S3..."
              aws s3 sync \
                s3://${S3_BUCKET}/models/qwen3-8b-awq-4bit/ \
                /models/qwen3-8b-awq-4bit/ \
                --endpoint-url ${S3_ENDPOINT}
              ls -lh /models/qwen3-8b-awq-4bit/
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          volumeMounts:
            - name: model-cache
              mountPath: /models
      containers:
        - name: vllm-sql
          image: vllm/vllm-openai:v0.9.1
          args:
            - --model=/models/qwen3-8b-awq-4bit
            - --dtype=auto
            - --max-model-len=6144
            - --gpu-memory-utilization=0.38
            - --max-num-seqs=2
            - --enforce-eager
            - --enable-auto-tool-choice
            - --tool-call-parser=hermes
          ports:
            - name: http
              containerPort: 8000
          volumeMounts:
            - name: model-cache
              mountPath: /models
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "4"
              memory: 8Gi
              nvidia.com/gpu: "1"
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: vllm-cache
