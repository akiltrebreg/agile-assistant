apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamlit
  namespace: agile-assistant
  labels:
    app: streamlit
    app.kubernetes.io/part-of: agile-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streamlit
  template:
    metadata:
      labels:
        app: streamlit
    spec:
      imagePullSecrets:
        - name: registry-credentials
      containers:
        - name: streamlit
          image: ghcr.io/akiltrebreg/agile-assistant:latest
          imagePullPolicy: IfNotPresent
          command:
            - streamlit
            - run
            - streamlit_app/app.py
            - --server.port=8501
            - --server.headless=true
            - --server.address=0.0.0.0
            - --server.enableStaticServing=true
          ports:
            - containerPort: 8501
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
