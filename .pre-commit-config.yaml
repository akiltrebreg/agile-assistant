repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.8
    hooks:
      - id: ruff-format
      - id: ruff-check

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=2000"]
      - id: end-of-file-fixer
        exclude: "^eval/results/.*$"
      - id: trailing-whitespace
        exclude: "^eval/results/.*$"
      - id: check-case-conflict
      - id: mixed-line-ending

  - repo: https://github.com/rbubley/mirrors-prettier
    # fork of oficial repo which support is discontinued
    rev: v3.7.4
    hooks:
      - id: prettier
        types_or: [markdown, yaml, json, dockerfile, shell, toml, sql]
        exclude: "^eval/results/.*$"
        additional_dependencies:
          - prettier@3.6.2
          - prettier-plugin-sh@0.18.0
          - prettier-plugin-toml@2.0.6
          - prettier-plugin-sql@0.19.2
          # for plugings see https://prettier.io/docs/plugins#community-plugins
        args: [--print-width=80, --prose-wrap=always]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        additional_dependencies: [tomli]
        # ROUGE is an NLP metric (Recall-Oriented Understudy for Gisting
        # Evaluation), not a typo of "rogue" — exclude the experiments
        # folder rather than maintain a custom ignore-words list.
        exclude: '^(database/data/.*\.csv|eval/results/.*|eval/llm_as_a_judge_experiments/.*)$'

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
